<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 {--bg:           #000000;--bg-2:         #060606;--bg-3:         #0a0a0a;--card:         #0f0f0f;--card-hover:   #161616;--border:       rgba(255,255,255,0.07);--border-blue:  rgba(37,99,235,0.3);

--blue:         #2563eb;--blue-dim:     #1e50c0;--blue-glow:    rgba(37,99,235,0.28);--blue-soft:    #60a5fa;--blue-light:   #93c5fd;

--white:        #ffffff;--text:         #e2e8f0;--muted:        #4b5563;--muted-2:      #94a3b8;

--gold:         #d4af37;--gold-glow:    rgba(212,175,55,0.2);

--radius:       12px;}

html { scroll-behavior: smooth; }body {background: var(--bg);color: var(--text);font-family: 'Inter', sans-serif;overflow-x: hidden;cursor: none;}

::-webkit-scrollbar { width: 4px; }::-webkit-scrollbar-track { background: #0a0a0a; }::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

/* CURSOR */#cursor {width: 12px; height: 12px; background: var(--blue-soft); border-radius: 50%;position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99999;transform: translate(-50%,-50%); transition: transform 0.1s, width 0.2s, height 0.2s;}#cursor-ring {width: 36px; height: 36px; border: 1px solid rgba(96,165,250,0.4); border-radius: 50%;position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99998;transform: translate(-50%,-50%); transition: transform 0.15s ease, width 0.3s, height 0.3s;}

/* SPOTLIGHT */#spotlight {position: fixed; top: 0; left: 0; width: 100%; height: 100%;pointer-events: none; z-index: 1;background: radial-gradient(circle 420px at var(--mx,50%) var(--my,50%), rgba(37,99,235,0.07) 0%, transparent 70%);}

/* PARTICLES */#particles-canvas {position: fixed; top: 0; left: 0; width: 100%; height: 100%;pointer-events: none; z-index: 0; opacity: 0.6;}

header{

/* SECTION BASE */section { position: relative; z-index: 2; }

/* LABELS */.section-label {display: inline-block; font-family: 'inter', monospace; font-size: 0.65rem;letter-spacing: 4px; color: var(--blue-soft); border: 1px solid rgba(96,165,250,0.18);padding: 6px 16px; margin-bottom: 20px;clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);background: rgba(37,99,235,0.07);}.section-title {font-family: 'inter', monospace; font-size: clamp(2rem, 4vw, 3.2rem);font-weight: 900; line-height: 1.1; letter-spacing: 2px; color: var(--white);}.section-title span { color: var(--blue-soft); }.section-sub { color: var(--muted-2); font-size: 1rem; line-height: 1.7; max-width: 560px; margin-top: 16px; }

/* ANIMATIONS */@keyframes fadeDown { from{opacity:0;transform(-20px)} to{opacity:1;transform(0)} }@keyframes fadeUp   { from{opacity:0;transform(20px)}  to{opacity:1;transform(0)} }@keyframes slideUp  { from{transform(100%)}             to{transform(0)} }@keyframes float    { 0%,100%{transform(0)} 50%{transform(-16px)} }@keyframes pulse    { 0%,100%{opacity:1;transform(1)} 50%{opacity:0.4;transform(0.95)} }@keyframes glow     { 0%,100%{box-shadow:0 0 20px var(--blue-glow)} 50%{box-shadow:0 0 50px rgba(37,99,235,0.45)} }@keyframes rotate   { from{transform(0deg)} to{transform(360deg)} }@keyframes counterRotate { from{transform(0deg)} to{transform(-360deg)} }@keyframes radarSpin { from{transform(0deg)} to{transform(360deg)} }@keyframes shimmer  { 0%{background-position:200% 0} 100%{background-position:-200% 0} }@keyframes scrollPulse { 0%,100%{opacity:1;transform(1)} 50%{opacity:0.3;transform(0.6)} }

.reveal { opacity:0; transform(40px); transition 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }.reveal.visible { opacity:1; transform(0); }.reveal-left  { opacity:0; transform(-40px); transition 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s; }.reveal-right { opacity:0; transform(40px);  transition 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s; }.reveal-left.visible, .reveal-right.visible { opacity:1; transform(0); }

/* GLASS CARD */.glass {background: var(--card); border: 1px solid var(--border);backdrop-filter: blur(20px); border-radius: var(--radius);transition: all 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow: 0 2px 12px rgba(0,0,0,0.5);}.glass {border-color: var(--blue); background: var(--card-hover);box-shadow: 0 0 30px var(--blue-glow), 0 12px 40px rgba(0,0,0,0.7);transform: translateY(-6px);}

/* DIVIDER */.divider { width:60px; height:2px; background(90deg, var(--blue), var(--blue-light)); margin:20px 0; }

/* HERO */#hero {height: 60vh; min-height: 700px;display: flex; align-items: center; justify-content: center;text-align: center; position: relative; overflow: hidden; background: #000;}#hero video {position: absolute; inset: 0; width: 100%; height: 100%;object-fit: cover; z-index: 0; }.hero-overlay {position: absolute; inset: 0;background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);z-index: 1;}.hero-content { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; }.hero-eyebrow {font-family: 'inter', monospace; font-size: 0.65rem; letter-spacing: 6px; color: var(--blue-soft);margin-bottom: 28px; opacity: 0; animation: fadeDown 0.8s 0.3s forwards;}.hero-title {font-family: 'inter', monospace; font-size: clamp(3rem, 8vw, 2rem);font-weight: 900; letter-spacing: 4px; line-height: 0.95; min-height: 2.5em; color: var(--white);}.hero-title .line { display: block; overflow: hidden; }.hero-title .line span { display: block; transform: translateY(100%); animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards; }.hero-title .line(1) span { animation-delay: 0.4s; }.hero-title .line(2) span { animation-delay: 0.6s; color: var(--blue-soft); }.hero-title .line(3) span { animation-delay: 0.8s; }.hero-sub { max-width:540px; color(--muted-2); font-size:1rem; line-height:1.7; margin-top:32px; opacity:0; animation 0.8s 1.1s forwards; }.hero-buttons { display; gap:20px; margin-top:40px; opacity:0; animation 0.8s 1.3s forwards; }.btn-primary {font-family:'inter',sans-serif; font-size:0.85rem; font-weight:700; letter-spacing:2px;padding:16px 36px; background(--blue); color:#fff; border; cursor;text-decoration; clip-path(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition 0.3s; display;}.btn-primary { background(--blue-dim); transform(-2px); box-shadow:0 20px 40px var(--blue-glow); }.btn-outline {font-family:'inter',sans-serif; font-size:0.85rem; font-weight:700; letter-spacing:2px;padding:16px 36px; background; color(--text); border:1px solid rgba(255,255,255,0.15);cursor; text-decoration; clip-path(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition 0.3s; display;}.btn-outline { border-color(--blue-soft); color(--blue-soft); background(37,99,235,0.1); }.hero-scroll {position; bottom:36px; left:50%; transform(-50%); z-index:3;display; flex-direction; align-items; gap:8px;opacity:0; animation 1s 1.6s forwards;}.scroll-label { font-family:'inter',monospace; font-size:0.55rem; letter-spacing:4px; color(--muted); }.scroll-line { width:1px; height:50px; background(180deg, var(--blue-soft), transparent); animation 2s ease-in-out infinite; }

/* OVERVIEW */#overview { padding:120px 60px; background(--bg); }.overview-grid { display; grid-template-columns(4,1fr); gap:24px; margin-top:60px; }.overview-card { position; overflow; padding:0; }.overview-card .card-img {width:100%; height:220px; object-fit; display;transition 0.6s cubic-bezier(0.16,1,0.3,1);filter(0.5) saturate(0.6);}.overview-card .card-img { transform(1.08); filter(0.75) saturate(1); }.overview-card .card-body { padding:28px; }.card-icon {width:48px; height:48px; border:1px solid rgba(37,99,235,0.25); border-radius:8px;display; align-items; justify-content; margin-bottom:16px; transition 0.3s;background(37,99,235,0.06);}.overview-card .card-icon { border-color(--blue-soft); box-shadow:0 0 20px var(--blue-glow); background(37,99,235,0.15); }.card-icon svg { width:24px; height:24px; fill(--blue-soft); }.card-title { font-family:'inter',monospace; font-size:0.9rem; font-weight:700; letter-spacing:1px; margin-bottom:10px; color(--white); }.card-desc { color(--muted-2); font-size:0.85rem; line-height:1.6; }.gradient-border {position; inset:0; border-radius(--radius); padding:1px;background(135deg, transparent, rgba(37,99,235,0.3), transparent, rgba(96,165,250,0.2), transparent);-webkit-mask(#fff 0 0) content-box, linear-gradient(#fff 0 0);-webkit-mask-composite; pointer-events; opacity:0; transition 0.4s;}.overview-card .gradient-border { opacity:1; }

/* AI TRACKING */#ai-tracking { padding:120px 60px; background(--bg-2); }.two-col { display; grid-template-columns:1fr 1fr; gap:80px; align-items; margin-top:60px; }.glow-image-wrap { position; border-radius:16px; overflow; animation 6s ease-in-out infinite; }.glow-image-wrap::before {content:''; position; inset:-2px; border-radius:18px;background(135deg, var(--blue), var(--blue-soft), var(--blue));z-index:-1; animation 4s linear infinite;}.glow-image-wrap::after {content:''; position; inset:0; border-radius:16px;box-shadow:0 0 80px rgba(37,99,235,0.35), inset 0 0 40px rgba(37,99,235,0.1); pointer-events;}.glow-image-wrap img { width:100%; height:460px; object-fit; display; border-radius:16px; filter(0.8) brightness(0.9); }.features-list { list-style; margin:28px 0; }.features-list li {display; align-items; gap:14px; padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-family:'inter',sans-serif; font-size:1rem; font-weight:500;letter-spacing:1px; color(--muted-2); transition 0.3s;}.features-list li { color(--white); }.feat-dot { width:8px; height:8px; border-radius:50%; background(--blue-soft); flex-shrink:0; box-shadow:0 0 8px rgba(96,165,250,0.5); }.progress-bars { margin-top:32px; }.prog-item { margin-bottom:20px; }.prog-label { display; justify-content; font-family:'inter',sans-serif; font-size:0.85rem; font-weight:600; letter-spacing:2px; color(--muted-2); margin-bottom:8px; }.prog-label span { color(--blue-soft); }.prog-track { height:3px; background(255,255,255,0.05); border-radius:3px; overflow; }.prog-fill { height:100%; border-radius:3px; background(90deg, var(--blue), var(--blue-light)); width:0%; transition 1.5s cubic-bezier(0.16,1,0.3,1); box-shadow:0 0 10px var(--blue-glow); }

/* COMPUTER VISION */#computer-vision { padding:120px 60px; position; overflow; background(--bg-3); }.grid-bg {position; inset:0;background-image(rgba(37,99,235,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);background-size:60px 60px;}.vision-header { text-align; position; }.stat-cards { display; grid-template-columns(3,1fr); gap:30px; margin-top:60px; position; }.stat-card { text-align; padding:50px 30px; position; }.stat-number {font-family:'inter',monospace; font-size(3rem, 5vw, 4.5rem); font-weight:900;background(135deg, var(--blue-soft), var(--blue-light));-webkit-background-clip; -webkit-text-fill-color; background-clip; line-height:1;}.stat-label { font-family:'inter',sans-serif; font-size:0.8rem; font-weight:600; letter-spacing:3px; color(--muted-2); margin-top:12px; text-transform; }.radar-ring { position; top:50%; left:50%; transform(-50%,-50%); border-radius:50%; border:1px solid rgba(37,99,235,0.1); animation 3s ease-in-out infinite; }.radar-ring(1){width:120px;height:120px;animation-delay:0s}.radar-ring(2){width:200px;height:200px;animation-delay:0.5s}.radar-ring(3){width:280px;height:280px;animation-delay:1s}

/* FEATURES */#features { padding:120px 60px; background(--bg); overflow; }.feature-grid { display; grid-template-columns(3,1fr); gap:24px; margin-top:60px; }.feat-card { padding:40px 32px; text-align; position; overflow; }.feat-card::before {content:''; position; top:0; left:0; right:0; height:2px;background(90deg, transparent, var(--blue-soft), transparent); opacity:0; transition 0.4s;}.feat-card:hover::before { opacity:1; }.feat-icon-wrap {width:64px; height:64px; margin:0 auto 20px; border-radius:12px;background(37,99,235,0.07); border:1px solid rgba(37,99,235,0.18);display; align-items; justify-content; transition 0.4s;}.feat-card .feat-icon-wrap { background(37,99,235,0.18); border-color(--blue-soft); box-shadow:0 0 30px var(--blue-glow); transform(1.1) rotate(5deg); }.feat-icon-wrap svg { width:28px; height:28px; fill(--blue-soft); }.feat-name { font-family:'inter',monospace; font-size:0.8rem; font-weight:700; letter-spacing:1px; margin-bottom:10px; color(--white); }.feat-desc { color(--muted-2); font-size:0.82rem; line-height:1.6; }

/* COUNTERS */#counters { padding:100px 60px; background(--bg-2); text-align; position; overflow; }#counters::before {content:''; position; top:-100px; left:50%; transform(-50%);width:600px; height:600px; border-radius:50%;background(circle, rgba(37,99,235,0.07) 0%, transparent 70%);}.counter-grid { display; grid-template-columns(4,1fr); gap:40px; position; }.counter-num { font-family:'inter',monospace; font-size(2.8rem, 5vw, 5rem); font-weight:900; color(--blue-soft); line-height:1; text-shadow:0 0 40px rgba(37,99,235,0.25); }.counter-label { font-family:'inter',sans-serif; font-size:0.75rem; font-weight:600; letter-spacing:4px; color(--muted-2); margin-top:10px; text-transform; }

/* VIDEO SHOWCASE */#video-showcase {position; height:70vh; min-height:500px; overflow;display; align-items; justify-content; background:#000;}#showcase-video { position; inset:0; width:100%; height:100%; object-fit; opacity:0.22; transform(1.1); transition 0.1s; }.showcase-overlay { position; inset:0; background(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,10,0.55) 50%, rgba(0,0,0,0.4) 100%); }.showcase-content { position; z-index:3; text-align; }.showcase-label { font-family:'inter',monospace; font-size:0.65rem; letter-spacing:6px; color(--gold); margin-bottom:20px; }.showcase-title { font-family:'inter',monospace; font-size(2rem, 4vw, 3.5rem); font-weight:900; letter-spacing:3px; line-height:1.1; color(--white); max-width:700px; margin:0 auto 36px; }

/* R&D */#rnd { padding:120px 60px; background(--bg); }.rnd-grid { display; grid-template-columns(3,1fr); gap:28px; margin-top:60px; }.rnd-card { overflow; }.rnd-img { width:100%; height:200px; object-fit; display; filter(0.35) brightness(0.65); transition 0.6s cubic-bezier(0.16,1,0.3,1), filter 0.4s; }.rnd-card .rnd-img { transform(1.06); filter(0.75) brightness(0.85); }.rnd-body { padding:28px; }.rnd-icon { width:40px; height:40px; border:1px solid var(--blue); border-radius:8px; display; align-items; justify-content; margin-bottom:16px; transition 0.3s; background(37,99,235,0.06); }.rnd-card .rnd-icon { background(--blue); box-shadow:0 0 20px var(--blue-glow); }.rnd-icon svg { width:20px; height:20px; fill(--blue-soft); }.rnd-card .rnd-icon svg { fill:#fff; }.rnd-title { font-family:'inter',monospace; font-size:0.9rem; font-weight:700; letter-spacing:1px; margin-bottom:10px; color(--white); }.rnd-desc { color(--muted-2); font-size:0.82rem; line-height:1.6; }

/* FUTURE */#future { padding:120px 60px; background(--bg-2); }.future-header { text-align; }.future-timeline { position; max-width:900px; margin:70px auto 0; }.future-timeline::before {content:''; position; left:50%; top:0; bottom:0; width:2px;background(180deg, var(--blue), var(--blue-light), var(--blue));transform(-50%); box-shadow:0 0 12px rgba(37,99,235,0.2);}.future-item { display; gap:50px; align-items; margin-bottom:50px; }.future-item(even) { flex-direction; }.future-item(even) .fi-card { text-align; }.fi-card { flex:1; padding:28px 32px; transition 0.4s; }.fi-card { border-color(--blue-soft); box-shadow:0 0 40px var(--blue-glow); }.fi-year { font-family:'inter',monospace; font-size:2rem; font-weight:900; color(--blue-soft); margin-bottom:8px; text-shadow:0 0 20px rgba(37,99,235,0.3); }.fi-title { font-family:'inter',monospace; font-size:0.85rem; font-weight:700; letter-spacing:1px; margin-bottom:8px; color(--white); }.fi-desc { color(--muted-2); font-size:0.82rem; line-height:1.6; }.fi-node { width:20px; height:20px; border-radius:50%; background(--blue); border:3px solid var(--bg-2); box-shadow:0 0 12px rgba(37,99,235,0.5); flex-shrink:0; margin-top:36px; position; z-index:2; }.fi-spacer { flex:1; }

/* FOOTER */footer { background:#020202; border-top:1px solid rgba(37,99,235,0.12); padding:80px 60px 40px; position; z-index:2; }.footer-grid { display; grid-template-columns:2fr 1fr 1fr 1fr; gap:60px; margin-bottom:60px; }.footer-logo { font-family:'inter',monospace; font-size:1.4rem; font-weight:900; color:#fff; letter-spacing:3px; margin-bottom:16px; }.footer-tagline { color(--muted-2); font-size:0.85rem; line-height:1.7; max-width:280px; }.footer-col-title { font-family:'inter',monospace; font-size:0.65rem; letter-spacing:4px; color(--blue-light); margin-bottom:20px; text-transform; }.footer-links { list-style; }.footer-links li { margin-bottom:10px; }.footer-links a { color(--muted-2); text-decoration; font-size:0.85rem; font-family:'inter',sans-serif; letter-spacing:1px; transition 0.3s; }.footer-links a { color(--white); }.footer-bottom { border-top:1px solid rgba(255,255,255,0.05); padding-top:28px; display; justify-content; align-items; }.footer-copy { font-size:0.75rem; color(--muted); font-family:'inter',sans-serif; letter-spacing:2px; }.footer-socials { display; gap:16px; }.social-btn { width:36px; height:36px; border:1px solid rgba(255,255,255,0.07); border-radius:6px; display; align-items; justify-content; cursor; transition 0.3s; }.social-btn { border-color(--blue-soft); box-shadow:0 0 15px var(--blue-glow); }.social-btn svg { width:16px; height:16px; fill(--muted); }.social-btn svg { fill(--blue-soft); }

/* RINGS */.rings-wrap { position; right:-80px; top:50%; transform(-50%); width:300px; height:300px; pointer-events; opacity:0.07; }.ring { position; border-radius:50%; border:1px solid var(--blue-soft); top:50%; left:50%; transform(-50%,-50%); }.ring(1){width:100px;height:100px;animation 8s linear infinite}.ring(2){width:180px;height:180px;animation 12s linear infinite}.ring(3){width:260px;height:260px;animation 16s linear infinite}

/* UTILITY */.text-center { text-align; }.mt-60 { margin-top:60px; }

/* RESPONSIVE /@media (max-width: 1100px) {.overview-grid { grid-template-columns(2,1fr); }.counter-grid  { grid-template-columns(2,1fr); }.footer-grid   { grid-template-columns:1fr 1fr; }}@media (max-width: 768px) {nav { padding:16px 24px; }nav.scrolled { padding:12px 24px; }.nav-links { display; }.overview-grid,.stat-cards,.rnd-grid { grid-template-columns:1fr; }.two-col { grid-template-columns:1fr; gap:40px; }.counter-grid { grid-template-columns:1fr 1fr; }.feature-grid { grid-template-columns:1fr 1fr; }#overview,#ai-tracking,#computer-vision,#features,#counters,#rnd,#future { padding:80px 24px; }.future-timeline::before { left:20px; }.future-item,.future-item(even) { flex-direction; gap:16px; }.fi-node { margin-top:0; }.fi-card,.future-item(even) .fi-card { text-align; }footer { padding:60px 24px 28px; }.footer-grid { grid-template-columns:1fr; gap:36px; }}/ ================= RESET ================= */

{ margin: 0; padding: 0; box-sizing: border-box; }

.product-toggle,.product-toggle.active {color: #c9a44c;transform: translateX(6px);}

.product-list {display: none;margin-top: 14px;padding-left: 28px;border-left: 1px solid rgba(255,255,255,0.18);}

.product-list.show { display: block; }

.product-list a {display: block;color: #fff;font-size: 20px;line-height: 1.35;margin-bottom: 12px;font-weight: 500;transition: all 0.3s ease;}

.product-list a {color: #c9a44c;transform: translateX(6px);}
